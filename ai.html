<!DOCTYPE html>
<html>
<head>
  <title>AI Teacher - Light Edu</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background-color: #F8FAFC; font-family: Arial, sans-serif; padding-bottom: 140px; }
    
    .header { background: #1E3A8A; color: white; padding: 15px 20px; display: flex; align-items: center; }
    .header-icon { font-size: 28px; margin-right: 10px; }
    .header h1 { font-size: 18px; margin: 0; }
    
    .chat-area { padding: 20px; display: flex; flex-direction: column; gap: 15px; }
    
    .message { padding: 12px 16px; border-radius: 16px; max-width: 85%; font-size: 15px; line-height: 1.4; word-wrap: break-word; }
    .message.ai { background: white; color: #1E293B; align-self: flex-start; border-top-left-radius: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    .message.user { background: #1E3A8A; color: white; align-self: flex-end; border-top-right-radius: 4px; }
    .message.typing { font-style: italic; color: #64748B; }
    
    .input-area { position: fixed; bottom: 60px; left: 0; right: 0; background: white; padding: 12px 15px; display: flex; align-items: center; border-top: 1px solid #E2E8F0; }
    .input-area input { flex: 1; padding: 12px; border: 1px solid #E2E8F0; background: #F1F5F9; border-radius: 25px; font-size: 16px; outline: none; }
    .input-area button { background: #DC2626; color: white; border: none; width: 45px; height: 45px; border-radius: 50%; margin-left: 10px; font-size: 20px; cursor: pointer; }

    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; justify-content: space-around; padding: 10px 0 15px; border-top: 1px solid #E2E8F0; z-index: 100; }
    .nav-btn { text-align: center; color: #94A3B8; text-decoration: none; font-size: 10px; flex: 1; }
    .nav-btn.active { color: #1E3A8A; font-weight: bold; }
    .nav-icon { font-size: 22px; display: block; margin-bottom: 4px; }
  </style>
</head>
<body>

  <div class="header">
    <span class="header-icon">🤖</span>
    <div>
      <h1>Professor LIGHT</h1>
      <div style="font-size: 12px; opacity: 0.8;">● Online • AI Teacher</div>
    </div>
  </div>

  <div class="chat-area" id="chat-box">
    <div class="message ai">
      Hello! I am Professor LIGHT. 🛡️<br>Ask me any question about Math, Science, or your exams!
    </div>
  </div>

  <div class="input-area">
    <input type="text" id="user-input" placeholder="Ask a question...">
    <button onclick="sendMessage()">➤</button>
  </div>
  <div class="bottom-nav">
    <a href="dashboard.html" class="nav-btn"><span class="nav-icon">🏠</span>Home</a>
    <a href="learn.html" class="nav-btn"><span class="nav-icon"></span>Learn</a>
    <a href="cbt.html" class="nav-btn"><span class="nav-icon">⚡</span>CBT</a>
    <a href="ai.html" class="nav-btn active"><span class="nav-icon">💬</span>AI</a>
    <a href="profile.html" class="nav-btn"><span class="nav-icon">👤</span>Profile</a>
  </div>

  <script>
    // 👇 PASTE YOUR GROQ API KEY INSIDE THE QUOTES BELOW 👇
    const GROQ_API_KEY = "PASTE_YOUR_GROQ_KEY_HERE"; 
    const MODEL = "llama3-8b-8192"; // Fast and free model

    async function sendMessage() {
      const input = document.getElementById('user-input');
      const chatBox = document.getElementById('chat-box');
      const text = input.value.trim();

      if (text === "") return;

      // 1. Add User Message
      const userMsg = document.createElement('div');
      userMsg.className = 'message user';
      userMsg.innerText = text;
      chatBox.appendChild(userMsg);
      
      input.value = "";
      chatBox.scrollTop = chatBox.scrollHeight;

      // 2. Show "Thinking..." bubble
      const typingMsg = document.createElement('div');
      typingMsg.className = 'message ai typing';
      typingMsg.innerText = "Professor LIGHT is thinking... 🧠";
      chatBox.appendChild(typingMsg);
      chatBox.scrollTop = chatBox.scrollHeight;

      // 3. Call the Real AI
      try {
        const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
          method: "POST",
          headers: {
            "Authorization": `Bearer ${GROQ_API_KEY}`,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            model: MODEL,
            messages: [
              {
                role: "system",                 content: "You are Professor LIGHT, a friendly and helpful AI teacher for Nigerian students preparing for WAEC, NECO, and UTME. Explain things simply, step-by-step, use emojis, and be encouraging. If they ask in Pidgin English, reply in Pidgin."
              },
              { role: "user", content: text }
            ]
          })
        });

        const data = await response.json();
        
        // Remove typing bubble
        chatBox.removeChild(typingMsg);

        if (data.choices && data.choices[0]) {
          const aiReply = data.choices[0].message.content;
          const aiMsg = document.createElement('div');
          aiMsg.className = 'message ai';
          aiMsg.innerText = aiReply;
          chatBox.appendChild(aiMsg);
        } else {
          throw new Error("No response from AI");
        }

      } catch (error) {
        chatBox.removeChild(typingMsg);
        const errorMsg = document.createElement('div');
        errorMsg.className = 'message ai';
        errorMsg.innerHTML = "Oops! I couldn't connect to the brain. 🤒 <br><i>(Check if your API key is correct in the code!)</i>";
        chatBox.appendChild(errorMsg);
      }
      
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    // Allow pressing "Enter" to send
    document.getElementById('user-input').addEventListener('keypress', function (e) {
      if (e.key === 'Enter') sendMessage();
    });
  </script>

</body>
</html>
