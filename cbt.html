<!DOCTYPE html>
<html>
<head>
  <title>CBT Practice - Light Edu</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { background-color: #F3F4F6; font-family: Arial, sans-serif; margin: 0; padding-bottom: 130px; }
    
    /* Exam Header with Timer */
    .exam-header {
      background-color: #1E3A8A;
      color: white;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .timer { background: #DC2626; padding: 5px 10px; border-radius: 5px; font-weight: bold; }
    
    /* Question Area */
    .question-box {
      background: white;
      margin: 15px;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .q-number { color: #6B7280; font-size: 14px; margin-bottom: 10px; }
    .q-text { font-size: 18px; font-weight: bold; color: #1E3A8A; line-height: 1.4; }
    
    /* Options */
    .option {
      background: #F9FAFB;
      border: 2px solid #E5E7EB;
      padding: 15px;
      margin-top: 10px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }
    .option.selected {
      background: #D1FAE5;
      border-color: #10B981; /* Green for selected */
      color: #065F46;
      font-weight: bold;
    }
    /* Action Buttons */
    .actions {
      display: flex;
      justify-content: space-between;
      margin: 0 15px;
    }
    .btn {
      padding: 12px 20px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }
    .btn-prev { background: #E5E7EB; color: #1E3A8A; }
    .btn-next { background: #1E3A8A; color: white; }
    .btn-flag { background: #FCA5A5; color: #991B1B; width: 100%; margin-top: 10px; }

    /* Bottom Nav */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: white; display: flex; justify-content: space-around;
      padding: 10px 0; border-top: 2px solid #1E3A8A;
    }
    .nav-btn { text-align: center; color: #6B7280; text-decoration: none; font-size: 11px; flex: 1; }
    .nav-btn.active { color: #1E3A8A; font-weight: bold; }
    .nav-icon { font-size: 24px; display: block; margin-bottom: 3px; }
  </style>
</head>
<body>

  <div class="exam-header">
    <span>UTME Mock Exam</span>
    <span class="timer">⏱️ 01:45:20</span>
  </div>

  <div class="question-box">
    <div class="q-number">Question 12 of 50</div>
    <div class="q-text">If log₁₀2 = 0.3010, find the value of log₁₀8.</div>
    
    <div class="option" onclick="selectOption(this)">A) 0.6020</div>
    <div class="option" onclick="selectOption(this)">B) 0.9030</div>
    <div class="option" onclick="selectOption(this)">C) 0.4515</div>
    <div class="option" onclick="selectOption(this)">D) 1.2040</div>
  </div>

  <div class="actions">
    <button class="btn btn-prev">◀ Prev</button>
    <button class="btn btn-next">Next ▶</button>
  </div>  <div style="margin: 0 15px;">
    <button class="btn btn-flag">🚩 Flag for Review</button>
  </div>

  <!-- Bottom Nav (CBT is active) -->
  <div class="bottom-nav">
    <a href="dashboard.html" class="nav-btn"><span class="nav-icon">🏠</span>Home</a>
    <a href="learn.html" class="nav-btn"><span class="nav-icon">📚</span>Learn</a>
    <a href="cbt.html" class="nav-btn active"><span class="nav-icon">⚡</span>CBT</a>
    <a href="ai.html" class="nav-btn"><span class="nav-icon">💬</span>AI</a>
    <a href="#" class="nav-btn"><span class="nav-icon">👤</span>Profile</a>
  </div>

  <script>
    // This little script makes the options turn green when you tap them!
    function selectOption(element) {
      // Remove 'selected' from all options
      let options = document.querySelectorAll('.option');
      options.forEach(opt => opt.classList.remove('selected'));
      // Add 'selected' to the tapped option
      element.classList.add('selected');
    }
  </script>

</body>
</html>
