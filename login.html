<!DOCTYPE html>
<html>
<head>
  <title>Login - Light Edu</title>
  <style>
    body {
      background-color: #1E3A8A;
      color: white;
      font-family: Arial, sans-serif;
      padding: 20px;
      margin: 0;
    }
    .back-btn {
      color: white;
      text-decoration: none;
      font-size: 18px;
    }
    h1 {
      text-align: center;
      margin-top: 40px;
    }
    .form-box {
      background-color: white;
      color: #1E3A8A;
      border-radius: 15px;
      padding: 25px;
      margin-top: 30px;
    }
    input {
      width: 100%;
      padding: 15px;
      margin: 10px 0;
      border: 2px solid #1E3A8A;
      border-radius: 8px;
      font-size: 16px;
      box-sizing: border-box;
    }
    .submit-btn {
      background-color: #DC2626;
      color: white;
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      margin-top: 10px;
      cursor: pointer;
    }
    .switch-text {
      text-align: center;
      margin-top: 20px;
      color: #1E3A8A;
    }
    .switch-link {
      color: #DC2626;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <a href="index.html" class="back-btn">← Back</a>
  
  <h1>Welcome Back!</h1>
  
  <div class="form-box">
    <input type="text" placeholder="Email or Phone Number">
    <input type="password" placeholder="Password">
    <a href="dashboard.html" class="submit-btn" style="text-align:center; display:block;">Login</a>
    
    <p class="switch-text">
      Don't have an account? <span class="switch-link">Sign Up</span>
    </p>
  </div>

</body>
</html>
