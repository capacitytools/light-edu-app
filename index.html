<!DOCTYPE html>
<html>
<head>
  <title>Light Edu App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      background-color: #1E3A8A; /* Your Brand Blue */
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 40px 20px;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    
    .logo {
      width: 140px;
      height: auto;
      margin-bottom: 20px;
    }
    
    h1 {
      font-size: 26px;
      margin: 5px 0;
      letter-spacing: 1px;
    }
    
    h2 {
      font-size: 16px;
      margin: 0 0 25px 0;
      font-weight: normal;
      color: #E0E7FF;
    }
    
    .motto {
      font-size: 16px;
      color: #FCA5A5; /* Light red for the motto */
      font-style: italic;
      margin-bottom: 40px;
    }
    
    .button {
      background-color: #DC2626; /* Your Brand Red */
      color: white;
      padding: 15px 40px;
      border-radius: 30px;
      text-decoration: none;
      font-size: 18px;
      font-weight: bold;
      display: inline-block;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>

  <!-- This is where your uploaded logo goes! -->
  <img src="logo.jpg" alt="Company Logo" class="logo">
  
  <h1>LIGHT IN THE LIGHT</h1>
  <h2>EDUCONSULT</h2>
  
  <p class="motto">...Raising Minds, Building Excellence.</p>

  <a href="login.html" class="button">Get Started</a>

</body>
</html>
